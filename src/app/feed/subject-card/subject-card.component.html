<mat-card>
  <mat-card-header>
    <mat-card-title>{{ subject?.details?.titre }} </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-accordion>
      <mat-expansion-panel [expanded]="true" *ngFor="let intervention of subject?.details?.interventions">
        <mat-expansion-panel-header>
          <mat-panel-title class="card-title">
            {{ intervention?.depute?.titre }}
            {{ intervention?.depute?.prenom }}
            {{ intervention?.depute?.nom }}
            ({{ intervention?.parti?.sigle }})
          </mat-panel-title>
          <mat-panel-description> </mat-panel-description>
        </mat-expansion-panel-header>
        <p *ngFor="let paragraph of intervention.paragraphes">{{ paragraph }}</p>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-card-content>
</mat-card>
